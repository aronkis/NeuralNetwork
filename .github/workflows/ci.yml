name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential pkg-config \
            libeigen3-dev python3-dev python3 python3-pip python3-matplotlib \
            libcurl4-openssl-dev

      - name: Configure CMake
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DNN_DISABLE_EIGEN_PARALLELISM=OFF -DNN_ENABLE_FAST_MATH=ON -DNN_EPOCHS=10 -DNN_PRINT_EVERY=100 -DBATCH_SIZE=128

      - name: Build
        run: |
          cmake --build build --config Release -- -j$(nproc)

      - name: Smoke run (headless)
        env:
          MPLBACKEND: Agg
        working-directory: build
        run: |
          ./neural_network
