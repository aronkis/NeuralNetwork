name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake build-essential pkg-config \
          libeigen3-dev python3-dev python3 python3-pip python3-matplotlib \
          libcurl4-openssl-dev libgtest-dev \
          libopenblas-dev \
          liblzma-dev libbz2-dev

    - name: Configure CMake
      run: |
        cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DNN_BUILD_TESTS=ON \
          -DNN_DISABLE_EIGEN_PARALLELISM=OFF \
          -DNN_ENABLE_FAST_MATH=OFF \

    - name: Build
      run: cmake --build build --config Release -- -j$(nproc)

    - name: Run tests
      working-directory: build
      run: |
        ./test/neural_network_tests
  
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        brew install cmake curl python@3.11 googletest openblas xz bzip2
        python3 -m pip install matplotlib numpy --break-system-packages
    
    - name: Configure CMake
      run: |
        cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DNN_BUILD_TESTS=ON \
          -DNN_DISABLE_EIGEN_PARALLELISM=OFF \
          -DNN_ENABLE_FAST_MATH=OFF \
          -DNN_EPOCHS=5 \
          -DNN_PRINT_EVERY=100 \
          -DBATCH_SIZE=128

    - name: Build
      run: cmake --build build --config Release -- -j$(sysctl -n hw.ncpu)

    - name: Run tests
      working-directory: build
      run: |
        ./test/neural_network_tests